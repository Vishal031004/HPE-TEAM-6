    async function sendQuestion() {
      if (!currentSessionId) return;
      const input = document.getElementById('chat-input');
      const text = input.value.trim();

      const stagingArea = document.getElementById('file-staging-area');
      const hasStagedFiles = stagingArea.querySelectorAll('.file-card.success').length > 0;

      // Allow sending if there is text OR an active quote OR staged files waiting to be sent
      if (!text && !activeQuote && !hasStagedFiles) return;

      let fullMessage = text;
      let displayMessage = text;

      // If no text was typed but a file is being sent, inject a local UI message (DO NOT call LLM backend)
      if (!text && !activeQuote && hasStagedFiles) {
        const topContainer = document.getElementById('attached-pdfs-container');
        let uploadedNames = [];

        stagingArea.querySelectorAll('.file-card.success .file-name').forEach(el => {
          const fileName = el.innerText;
          uploadedNames.push(fileName);
          const isDuplicate = Array.from(topContainer.children).some(child => child.innerText.includes(fileName));
          if (!isDuplicate) {
            topContainer.innerHTML += `
              <span class="pdf-pill-group" style="display:inline-flex; align-items:center; gap:2px; margin-right:4px;">
                <a href="/api/datasheets/${encodeURIComponent(fileName)}" target="_blank" class="pdf-pill" title="Click to view PDF" style="margin-right:0; border-radius:4px 0 0 4px;">📄 ${fileName}</a>
                <button onclick="triggerFindAlternativesForFile('${fileName.replace(/'/g, "\\'")}')" 
                  style="background:var(--surface2); border:1px solid var(--border); border-left:none; color:var(--accent); cursor:pointer; padding:4px 6px; font-size:12px; border-radius:0;" 
                  title="Find alternatives for ${fileName}">🔍</button>
                <button onclick="detachPdfFromWorkspace('', '${fileName.replace(/'/g, "\\'")}')" 
                  style="background:var(--surface2); border:1px solid var(--border); border-left:none; color:var(--danger); cursor:pointer; padding:4px 6px; font-size:12px; border-radius:0 4px 4px 0;" 
                  title="Remove ${fileName} from workspace">✕</button>
              </span>`;
          }
        });

        stagingArea.innerHTML = "";
        input.value = "";

        let msgHtml = "";
        if (uploadedNames.length > 1) {
          latestFilename = ""; // Clear active file to ensure LLM recognizes ambiguity
          msgHtml = `<span style="color:var(--accent)">📄 <b>${uploadedNames.length} datasheets</b> have been successfully attached to the workspace!</span><br><br>You can now ask questions about them below, or click their 🔍 buttons at the top to find market alternatives individually.`;
        } else if (uploadedNames.length === 1) {
          latestFilename = uploadedNames[0];
          msgHtml = `<span style="color:var(--accent)">📄 <b>${uploadedNames[0]}</b> has been successfully attached to the workspace!</span><br><br>You can now ask questions about this datasheet below, or click its 🔍 button at the top to find alternatives.`;
        }

        if (msgHtml) {
          appendSystemMessage(msgHtml);
          chatHistory.push({ "role": "assistant", "content": msgHtml });
          fetch("/api/sessions/save_messages", {
            method: "POST", headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              session_id: currentSessionId, new_messages: [
                { "role": "assistant", "content": msgHtml }
              ]
            })
          });
        }

        return;
      }

      // If a quote is attached, format it for the UI and the LLM Backend
      if (activeQuote) {
        fullMessage = `Context: "${activeQuote}"\n\nQuestion: ${text}`;
        displayMessage = `
          <div style="background: var(--surface); border-left: 3px solid var(--accent2); padding: 8px 12px; margin-bottom: 8px; border-radius: 4px; font-size: 12px; color: var(--muted); font-style: italic;">
            "${activeQuote}"
          </div>
          <div>${text}</div>
        `;
        clearQuote();
      }

      input.value = "";

      // Move all staged files to the top header permanently BEFORE clearing the input box
      const topContainer = document.getElementById('attached-pdfs-container');

      stagingArea.querySelectorAll('.file-card.success .file-name').forEach(el => {
        const fileName = el.innerText;
        latestFilename = fileName;
        appendPdfPill(fileName, topContainer);
      });

      // Now clear the staging area
      stagingArea.innerHTML = "";

      appendUserMessage(displayMessage);

      const loadingId = "loading-" + Date.now();
      document.getElementById('chat-container').innerHTML += `<div class="msg-row system" id="${loadingId}"><div class="bubble"><div class="bubble-content" style="color:var(--muted)">Thinking...</div></div></div>`;
      document.getElementById('chat-container').scrollTo({ top: document.getElementById('chat-container').scrollHeight });

      try {
        const res = await fetch("/api/chat/stream", {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            user_id: currentUser, session_id: currentSessionId,
            question: fullMessage, chat_history: chatHistory,
            is_global: true, active_file: latestFilename
          })
        });

        const contentType = res.headers.get("content-type") || "";

        if (contentType.includes("text/event-stream")) {
          // ✨ SSE STREAMING MODE — render tokens word-by-word
          document.getElementById(loadingId).remove();

          const streamMsgId = "stream-" + Date.now();
          const chatContainer = document.getElementById('chat-container');
          chatContainer.innerHTML += `<div class="msg-row system" id="${streamMsgId}"><div class="bubble"><div class="bubble-content" id="${streamMsgId}-content"></div></div></div>`;

          let fullAnswer = "";
          const reader = res.body.getReader();
          const decoder = new TextDecoder();
          let buffer = "";

          while (true) {
            const { done, value } = await reader.read();
            if (done) break;

            buffer += decoder.decode(value, { stream: true });
            const lines = buffer.split("\n");
            buffer = lines.pop(); // Keep incomplete line in buffer

            for (const line of lines) {
              if (line.startsWith("data: ")) {
                const token = line.slice(6);
                if (token === "[DONE]") break;
                if (token.startsWith("[Error:")) {
                  fullAnswer += token;
                  break;
                }
                try {
                  fullAnswer += JSON.parse(token);
                } catch (e) {
                  fullAnswer += token; // fallback just in case
                }
                const contentEl = document.getElementById(`${streamMsgId}-content`);
                if (contentEl) {
                  contentEl.innerHTML = marked.parse(fullAnswer);
                  chatContainer.scrollTo({ top: chatContainer.scrollHeight });
                }
              }
            }
          }

          // Final render with full markdown
          const contentEl = document.getElementById(`${streamMsgId}-content`);
          if (contentEl) contentEl.innerHTML = marked.parse(fullAnswer);

          chatHistory.push({ "role": "user", "content": text || displayMessage });
          chatHistory.push({ "role": "assistant", "content": fullAnswer });

        } else {
          // JSON fallback (shouldn't normally happen now since chat/stream is pure RAG)
          const data = await res.json();
          document.getElementById(loadingId).remove();

          if (data.error) { appendSystemMessage(`<span style="color:var(--danger)">Error: ${data.error}</span>`); return; }

          chatHistory.push({ "role": "user", "content": text || displayMessage });

          if (data.type === "interactive_ranking") {
            promptForWeightsInChat(data.answer, data.extracted_specs, data.detected_type);
            chatHistory.push({ "role": "assistant", "content": JSON.stringify(data) });
          } else {
            appendSystemMessage(data.answer);
            chatHistory.push({ "role": "assistant", "content": data.answer });
          }
        }

        // Save memory to backend
        await fetch("/api/sessions/save_messages", {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            session_id: currentSessionId, new_messages: [
              { "role": "user", "content": text || displayMessage },
              { "role": "assistant", "content": chatHistory[chatHistory.length - 1].content }
            ]
          })
        });
      } catch (err) {
        document.getElementById(loadingId)?.remove();
        const friendly = getFriendlyErrorMessage(err);
        const errorMsg = `⚠️ <b>${friendly.title}</b> — ${friendly.body}<br><button onclick="sendQuestion()" style="margin-top:8px; padding:6px 16px; background:var(--surface2); border:1px solid var(--border); color:var(--accent); border-radius:4px; cursor:pointer; font-family:var(--mono); font-size:12px;">🔄 Retry</button>`;
        appendSystemMessage(`<div class="empty-state" style="color:var(--danger)">${errorMsg}</div>`);
      }
    }
    // --- INTERACTIVE MATH WIDGETS ---
    function unpackValue(val) {
      if (val === null || val === undefined) return "Not Found";
      if (typeof val === 'object') return val.value || val.Value || val.text || JSON.stringify(val);
      return String(val);
    }

    if (!window.mathEngineStates) window.mathEngineStates = {};

    function promptForWeightsInChat(introText, specs, dType) {
      const engineId = 'engine-' + Date.now() + Math.floor(Math.random() * 1000);
      let validFeatures = [];
      for (const [feature, rawValue] of Object.entries(specs)) {
        const displayVal = unpackValue(rawValue);
        if (displayVal !== "Not Found" && displayVal !== "null") validFeatures.push(feature);
      }

      const numToSelect = Math.ceil(validFeatures.length / 2);

      window.mathEngineStates[engineId] = {
        activeFeatures: validFeatures.slice(0, numToSelect),
        inactiveFeatures: validFeatures.slice(numToSelect),
        currentWeightValues: {},
        extractedSpecs: specs,
        detectedType: dType
      };

      let html = `<p>${introText}</p>`;
      html += `<p style="margin-top:12px;">Component Class: <strong style="color:var(--accent)">${dType}</strong></p>`;
      html += `<div id="weight-panel-container-${engineId}"></div>`;
      html += `<button class="btn" style="margin-top:20px;" onclick="submitWeights(this, '${engineId}')">▶ RUN MARKET MATH ENGINE</button>`;

      appendSystemMessage(html);
      renderWeightPanel(engineId);
    }

    function saveCurrentWeights(engineId) {
      const state = window.mathEngineStates[engineId];
      state.activeFeatures.forEach(feature => {
        const cleanId = feature.replace(/\W+/g, '');
        const el = document.getElementById(`w-${engineId}-${cleanId}`);
        if (el) state.currentWeightValues[feature] = parseInt(el.value || '0', 10);
      });
    }

    function removeFeature(featureName, engineId) {
      const state = window.mathEngineStates[engineId];
      saveCurrentWeights(engineId);
      state.activeFeatures = state.activeFeatures.filter(f => f !== featureName);
      state.inactiveFeatures.push(featureName);
      state.currentWeightValues[featureName] = 0;
      renderWeightPanel(engineId);
    }

    function addFeature(engineId) {
      const state = window.mathEngineStates[engineId];
      const selectEl = document.getElementById(`add-feature-select-${engineId}`);
      if (!selectEl || !selectEl.value) return;
      const featureName = selectEl.value;
      saveCurrentWeights(engineId);
      state.inactiveFeatures = state.inactiveFeatures.filter(f => f !== featureName);
      state.activeFeatures.push(featureName);
      if (!(featureName in state.currentWeightValues)) state.currentWeightValues[featureName] = 0;
      renderWeightPanel(engineId);
    }

    function renderWeightPanel(engineId) {
      const state = window.mathEngineStates[engineId];
      const container = document.getElementById(`weight-panel-container-${engineId}`);
      if (!container) return;

      let html = `<div class="weight-panel">
        <div style="display:flex; justify-content:space-between; margin-bottom:12px; font-family:var(--mono); font-size:12px;">
          <span>Allocated: <strong id="allocated-weight-${engineId}" style="color:var(--warn)">0%</strong></span>
          <span>Remaining: <strong id="remaining-weight-${engineId}" style="color:var(--accent)">100%</strong></span>
        </div>`;

      state.activeFeatures.forEach(feature => {
        const displayVal = unpackValue(state.extractedSpecs[feature]);
        const cleanId = feature.replace(/\W+/g, '');
        const val = state.currentWeightValues[feature] || 0;
        html += `
          <div class="weight-row">
            <div class="spec-name">${feature}</div>
            <div class="spec-val">${displayVal}</div>
            <input type="range" min="0" max="100" value="${val}" id="w-${engineId}-${cleanId}" oninput="handleWeightChange(this, '${engineId}')">
            <div class="weight-val" id="v-${engineId}-${cleanId}">${val}%</div>
            <button class="btn-remove" onclick="removeFeature('${feature}', '${engineId}')" title="Remove">−</button>
          </div>`;
      });

      if (state.inactiveFeatures.length > 0) {
        html += `
          <div class="add-feature-bar">
            <select id="add-feature-select-${engineId}">${state.inactiveFeatures.map(f => `<option value="${f}">${f}</option>`).join('')}</select>
            <button class="btn-add" onclick="addFeature('${engineId}')" title="Add Feature">+</button>
          </div>`;
      }

      html += `</div>`;
      container.innerHTML = html;

      state.activeFeatures.forEach(feature => { const el = document.getElementById(`w-${engineId}-${feature.replace(/\W+/g, '')}`); if (el) handleWeightChange(el, engineId); });
      refreshWeightBudgetUI(engineId);
    }

    function getWeightSliders(engineId) { return Array.from(document.getElementById(`weight-panel-container-${engineId}`)?.querySelectorAll('input[type="range"]') || []); }
    function getAllocatedWeight(engineId) { return getWeightSliders(engineId).reduce((s, el) => s + parseInt(el.value || '0', 10), 0); }
    function refreshWeightBudgetUI(engineId) {
      const total = getAllocatedWeight(engineId); const remaining = Math.max(0, TOTAL_WEIGHT_BUDGET - total);
      const allocEl = document.getElementById(`allocated-weight-${engineId}`); const remEl = document.getElementById(`remaining-weight-${engineId}`);
      if (allocEl) allocEl.innerText = `${total}%`; if (remEl) remEl.innerText = `${remaining}%`;
      getWeightSliders(engineId).forEach(slider => {
        const ownVal = parseInt(slider.value || '0', 10);
        const valEl = document.getElementById(`v-${slider.id.slice(2)}`); if (valEl) valEl.innerText = `${ownVal}%`;
      });
    }

    function handleWeightChange(slider, engineId) {
      const allSliders = getWeightSliders(engineId);
      let otherTotal = 0;
      allSliders.forEach(s => { if (s !== slider) otherTotal += parseInt(s.value || '0', 10); });

      const maxAllowed = Math.max(0, TOTAL_WEIGHT_BUDGET - otherTotal);
      let v = parseInt(slider.value || '0', 10);
      if (v > maxAllowed) {
        v = maxAllowed;
        slider.value = String(v);
      }
      refreshWeightBudgetUI(engineId);
    }

    async function submitWeights(btn, engineId) {
      btn.disabled = true; btn.innerText = "Processing...";
      let weights = {};
      const state = window.mathEngineStates[engineId];

      // Send active features with their selected weights
      let totalWeight = 0;
      for (const feature of state.activeFeatures) {
        const el = document.getElementById(`w-${engineId}-${feature.replace(/\W+/g, '')}`);
        if (el) {
          const val = parseInt(el.value);
          weights[feature] = val;
          state.currentWeightValues[feature] = val;
          totalWeight += val;
        }
      }

      // If user allocated 0 weight, auto-distribute equally!
      if (totalWeight === 0 && state.activeFeatures.length > 0) {
        const eqW = Math.floor(100 / state.activeFeatures.length);
        for (const feature of state.activeFeatures) {
          weights[feature] = eqW;
          state.currentWeightValues[feature] = eqW;
          const el = document.getElementById(`w-${engineId}-${feature.replace(/\W+/g, '')}`);
          if (el) {
            el.value = eqW;
            const pctEl = document.getElementById(`pct-${engineId}-${feature.replace(/\W+/g, '')}`);
            if (pctEl) pctEl.innerText = `${eqW}%`;
          }
        }
        refreshWeightBudgetUI(engineId);
      }

      // Explicitly send 0 for inactive features so backend doesn't default them to 10!
      for (const f of Object.keys(state.currentWeightValues)) {
        if (!state.activeFeatures.includes(f)) {
          weights[f] = 0;
        }
      }

      const loadingId = "loading-math-" + Date.now();
      document.getElementById('chat-container').innerHTML += `<div class="msg-row system" id="${loadingId}"><div class="bubble"><div class="bubble-content" style="color:var(--muted)">Crunching mathematical distances...</div></div></div>`;
      document.getElementById('chat-container').scrollTo({ top: document.getElementById('chat-container').scrollHeight });

      try {
        const res = await fetch("/api/rank", {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ detected_type: state.detectedType, extracted_specs: state.extractedSpecs, weights: weights })
        });
        const data = await res.json();
        document.getElementById(loadingId).remove();

        const containerId = 'res-' + Date.now();
        let resHTML = `<div style="display:flex; justify-content:space-between; align-items:center;">
          <p style="margin:0;"><strong>Market Alternatives Computed:</strong></p>
          <button class="btn" style="padding:4px 8px; font-size:11px;" onclick="exportComparisonToPDF('${engineId}', '${containerId}')" title="Export comparison as PDF">📄 Export PDF</button>
        </div>`;

        resHTML += `
          <div id="sort-controls-${containerId}" style="display:none; margin-top:16px; margin-bottom:16px; gap:10px; align-items:center;">
            <span style="font-family:var(--mono);font-size:12px;color:var(--muted)">Sort by:</span>
            <button class="sort-btn" onclick="sortCards('${containerId}', 'price')" title="Lowest to Highest Price">💰 Price ↑</button>
            <button class="sort-btn" onclick="sortCards('${containerId}', 'stock')" title="Highest to Lowest Stock">📦 Stock ↓</button>
          </div>
          <div id="${containerId}" style="display:flex; flex-direction:column; gap:16px;">
        `;

        data.results.forEach((match, idx) => {
          let specHTML = "";
          const featureScores = match.feature_scores || {};
          for (const [k, v] of Object.entries(match.specs)) {
            let fscore = featureScores[k];

            let dots = "";
            const currentW = state.currentWeightValues[k] !== undefined ? state.currentWeightValues[k] : 0;
            // If weight is explicitly 0 or feature is inactive, hide dots to prevent confusion!
            if (currentW === 0 || !state.activeFeatures.includes(k)) {
              dots = '<span style="font-size:10px; color:var(--muted); opacity:0.6; margin-left:8px;" title="This feature had 0 weight and was ignored by the math engine.">Ignored</span>';
            } else {
              dots = renderContribDots(fscore);
            }

            specHTML += `<div class="spec-item"><span class="spec-item-text"><span style="color:var(--muted)">${k}:</span> ${unpackValue(v)}</span>${dots}</div>`;
          }
          resHTML += `
            <div class="part-card" style="margin-top:0;" data-score="${match.score}" data-price="Infinity" data-stock="-1" id="card-${containerId}-${match.part_number}">
              <div class="part-card-header">
                <div class="mpn">#${idx + 1} - ${match.part_number}</div>
                <div class="score-badge">${match.score}% MATCH</div>
              </div>
              <div class="pricing-row" id="pricing-${containerId}-${match.part_number}">
                <span class="pricing-loading">⏳ Fetching live pricing...</span>
              </div>
              <div class="spec-grid">${specHTML}</div>
              <div class="card-actions">
                <a class="btn-datasheet" id="ds-${containerId}-${match.part_number}" href="https://www.google.com/search?q=${encodeURIComponent(match.part_number + ' datasheet filetype:pdf')}" target="_blank">📋 FIND DATASHEET</a>
                <a class="btn-buy" id="buy-${containerId}-${match.part_number}" href="https://www.digikey.com/en/products/result?keywords=${encodeURIComponent(match.part_number)}" target="_blank">🛒 BUY</a>
              </div>
            </div>`;
        });
        resHTML += `</div>`;

        appendRawHTML(resHTML);
        const pricingData = await fetchLivePricing(data.results, containerId);

        // Save results to chat history
        const resultData = {
          type: "math_engine_results",
          html: resHTML,
          results: data.results,
          container_id: containerId,
          pricing: pricingData,
          engine_id: engineId,
          weights: weights
        };
        chatHistory.push({ "role": "assistant", "content": JSON.stringify(resultData) });

        fetch("/api/sessions/save_messages", {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            session_id: currentSessionId, new_messages: [
              { "role": "assistant", "content": JSON.stringify(resultData) }
            ]
          })
        });

      } catch (err) {
        document.getElementById(loadingId).remove();
        appendRawHTML(`<span style="color:var(--danger)">Math Engine failed.</span>`);
      }
      btn.style.display = 'none'; // Hide button after successful run
    }

    function injectPricing(results, containerId, pricing) {
      results.forEach((match) => {
        const el = document.getElementById(`pricing-${containerId}-${match.part_number}`);
        if (!el) return;

        const info = pricing[match.part_number];
        const cardEl = document.getElementById(`card-${containerId}-${match.part_number}`);

        if (!info || info.error) {
          el.innerHTML = `<span class="pricing-badge badge-price">💰 Price: N/A</span><span class="pricing-badge badge-stock no-stock">📦 Stock: N/A</span>`; return;
        }

        if (cardEl) {
          cardEl.setAttribute('data-price', info.price !== null ? info.price : Infinity);
          cardEl.setAttribute('data-stock', info.stock !== null && info.stock !== undefined ? info.stock : -1);
        }

        const priceStr = info.price !== null ? `$${Number(info.price).toFixed(2)}` : 'N/A';
        const stock = info.stock;
        let stockClass = 'in-stock', stockLabel = '';
        if (stock === null || stock === undefined) { stockClass = 'no-stock'; stockLabel = 'N/A'; }
        else if (stock === 0) { stockClass = 'no-stock'; stockLabel = 'Out of Stock'; }
        else if (stock < 100) { stockClass = 'low-stock'; stockLabel = `${stock.toLocaleString()} units`; }
        else { stockClass = 'in-stock'; stockLabel = `${stock.toLocaleString()} units`; }

        el.innerHTML = `<span class="pricing-badge badge-price">💰 ${priceStr}</span><span class="pricing-badge badge-stock ${stockClass}">📦 ${stockLabel}</span>`;

        if (info.datasheet_url) document.getElementById(`ds-${containerId}-${match.part_number}`).href = info.datasheet_url;
        if (info.digikey_url) document.getElementById(`buy-${containerId}-${match.part_number}`).href = info.digikey_url;
      });

      const controls = document.getElementById(`sort-controls-${containerId}`);
      if (controls) controls.style.display = 'flex';
    }

    async function fetchLivePricing(results, containerId) {
      const partNumbers = results.map(r => r.part_number);
      try {
        const res = await fetch("/api/pricing", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ part_numbers: partNumbers }) });
        const data = await res.json();
        const pricing = data.pricing || {};
        injectPricing(results, containerId, pricing);
        return pricing;
      } catch (e) {
        console.error("Pricing fetch failed:", e);
        return {};
      }
    }

    function renderContribDots(score) {
      if (score === undefined || score === null) return '';
      const filled = Math.round(score * 5);
      let html = '<span class="contrib-dots" title="' + Math.round(score * 100) + '% match">';
      for (let i = 0; i < 5; i++) {
        html += i < filled ? '<span class="contrib-dot"></span>' : '<span class="contrib-dot empty"></span>';
      }
      html += '</span>';
      return html;
    }

    function exportComparisonToPDF(engineId, containerId) {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });

      const state = window.mathEngineStates[engineId];
      const container = document.getElementById(containerId);
      if (!container) { alert('No results to export.'); return; }

      const cards = Array.from(container.querySelectorAll('.part-card'));
      if (cards.length === 0) { alert('No alternative cards found.'); return; }

      // Gather data from DOM
      const partNumbers = cards.map(c => c.querySelector('.mpn')?.innerText?.replace(/^#\d+\s*-\s*/, '') || 'N/A');
      const scores = cards.map(c => c.querySelector('.score-badge')?.innerText || 'N/A');

      // Gather pricing from DOM
      const prices = cards.map(c => {
        const priceEl = c.querySelector('.badge-price');
        return priceEl ? priceEl.innerText.replace('💰', '').trim() : 'N/A';
      });
      const stocks = cards.map(c => {
        const stockEl = c.querySelector('.badge-stock');
        return stockEl ? stockEl.innerText.replace('📦', '').trim() : 'N/A';
      });

      // Gather all spec keys from the first card (they all share the same schema)
      const specKeys = [];
      const specData = []; // specData[cardIdx][specKey] = value
      cards.forEach((card, ci) => {
        const items = card.querySelectorAll('.spec-item');
        const cardSpecs = {};
        items.forEach(item => {
          const textEl = item.querySelector('.spec-item-text');
          if (!textEl) return;
          const parts = textEl.innerText.split(':');
          const key = parts[0].trim();
          const val = parts.slice(1).join(':').trim();
          if (ci === 0) specKeys.push(key);
          cardSpecs[key] = val;
        });
        specData.push(cardSpecs);
      });

      // Header
      doc.setFontSize(18);
      doc.setTextColor(0, 229, 176);
      doc.text('SPECFLOW — Component Comparison Report', 14, 18);

      doc.setFontSize(10);
      doc.setTextColor(100);
      let finalWeights = null;
      let finalComponentType = state?.detectedType || 'N/A';
      let correctFilename = null;

      // 1. Find weights and component type
      if (state && state.currentWeightValues) {
        finalWeights = state.currentWeightValues;
      } else {
        for (const msg of chatHistory) {
          if (msg.role === 'assistant' && msg.content.startsWith('{')) {
            try {
              const data = JSON.parse(msg.content);
              if (data.type === 'interactive_ranking' && data.detected_type) {
                finalComponentType = data.detected_type;
              }
              if (data.type === 'math_engine_results' && data.engine_id === engineId) {
                finalWeights = data.weights;
                break;
              }
            } catch (e) { }
          }
        }
      }

      // 2. Find the specific filename that triggered this engineId
      for (let i = 0; i < chatHistory.length; i++) {
        const msg = chatHistory[i];
        if (msg.role === 'assistant' && msg.content.includes(engineId)) {
          // Look backwards to find the last user message
          for (let j = i - 1; j >= 0; j--) {
            if (chatHistory[j].role === 'user') {
              const userContent = chatHistory[j].content;
              const match = userContent.match(/Find alternatives for (.*)/i);
              if (match) {
                correctFilename = match[1].trim();
                break;
              }
            }
          }
          if (correctFilename) break; // found it
        }
      }

      const uploadedPdf = correctFilename || latestFilename || 'N/A';
      const componentType = finalComponentType;
      doc.text(`Uploaded PDF: ${uploadedPdf}`, 14, 26);
      doc.text(`Component Type: ${componentType}`, 14, 31);

      // Weights summary
      let weightStr = 'Feature Weights: ';
      const weightParts = [];
      if (finalWeights) {
        for (const [feat, val] of Object.entries(finalWeights)) {
          if (val > 0) weightParts.push(`${feat} ${val}%`);
        }
      }
      doc.text(weightStr + (weightParts.length > 0 ? weightParts.join(', ') : 'Default'), 14, 36);

      doc.setDrawColor(42, 51, 72);
      doc.line(14, 39, 283, 39);

      // Build table
      const tableHead = [['Feature', ...partNumbers]];
      const tableBody = [];

      // Match Score row
      tableBody.push(['Match Score', ...scores]);
      // Price row
      tableBody.push(['Price', ...prices]);
      // Stock row
      tableBody.push(['Stock', ...stocks]);
      // Spec rows
      specKeys.forEach(key => {
        const row = [key];
        specData.forEach(cd => row.push(cd[key] || 'N/A'));
        tableBody.push(row);
      });

      doc.autoTable({
        head: tableHead,
        body: tableBody,
        startY: 42,
        theme: 'grid',
        styles: { fontSize: 8, cellPadding: 3, textColor: [226, 232, 240], fillColor: [20, 24, 32] },
        headStyles: { fillColor: [0, 153, 255], textColor: [255, 255, 255], fontStyle: 'bold', fontSize: 9 },
        alternateRowStyles: { fillColor: [28, 34, 48] },
        columnStyles: { 0: { fontStyle: 'bold', fillColor: [20, 24, 32], textColor: [0, 229, 176] } },
        margin: { left: 14, right: 14 },
      });

      let baseName = uploadedPdf !== 'N/A' ? uploadedPdf : 'SpecFlow-Comparison';
      if (baseName.toLowerCase().endsWith('.pdf')) {
        baseName = baseName.slice(0, -4);
      }
      doc.save(`${baseName}_Alternatives.pdf`);
    }

    function sortCards(containerId, criterion) {
      const container = document.getElementById(containerId);
      if (!container) return;
      const cards = Array.from(container.querySelectorAll('.part-card'));

      cards.sort((a, b) => {
        if (criterion === 'price') {
          const pa = parseFloat(a.getAttribute('data-price'));
          const pb = parseFloat(b.getAttribute('data-price'));
          return pa - pb; // Ascending (cheapest first)
        } else if (criterion === 'stock') {
          const sa = parseInt(a.getAttribute('data-stock'), 10);
          const sb = parseInt(b.getAttribute('data-stock'), 10);
          return sb - sa; // Descending (most stock first)
        } else {
          // Default: score
          const sa = parseFloat(a.getAttribute('data-score'));
          const sb = parseFloat(b.getAttribute('data-score'));
          return sb - sa; // Descending
        }
      });

      // Re-append in new order
      cards.forEach(card => container.appendChild(card));
    }

    // --- FIND ALTERNATIVES MODAL & FLOW ---
    function openFindAlternativesModal() {
      if (!currentSessionId) {
        alert("Please select or create a workspace first.");
        return;
      }

      const attached = window.currentAttachedPdfs || [];
      const uniqueAttached = [];
      const seen = new Set();
      for (const p of attached) {
        if (!seen.has(p.filename)) {
          seen.add(p.filename);
          uniqueAttached.push(p);
        }
      }

      if (uniqueAttached.length === 0) {
        alert("Please attach at least 1 PDF to this workspace first.");
        return;
      }

      const listDiv = document.getElementById('find-alt-modal-list');
      listDiv.innerHTML = uniqueAttached.map((p, i) => `
        <label style="display:flex; align-items:center; gap:8px; cursor:pointer; padding:4px 0;">
          <input type="radio" name="find-alt-radio" value="${p.filename}" ${i === 0 ? 'checked' : ''}>
          <span>📄 ${p.filename}</span>
        </label>
      `).join('');

      document.getElementById('find-alt-modal').style.display = 'flex';
    }

    async function executeFindAlternatives() {
      const selected = document.querySelector('input[name="find-alt-radio"]:checked');
      if (!selected) {
        alert("Please select a PDF.");
        return;
      }

      document.getElementById('find-alt-modal').style.display = 'none';
      await triggerFindAlternativesForFile(selected.value);
    }

    async function triggerFindAlternativesForFile(filename) {
      if (!currentSessionId) return;

      appendUserMessage(`Find alternatives for ${filename}`);

      const loadingId = "loading-alt-" + Date.now();

      const initialProgressHTML = `
        <div class="msg-row system" id="${loadingId}">
          <div class="bubble" style="width: 100%; max-width: 400px; font-family: var(--mono); font-size: 12px;">
            <div class="bubble-content">
              <div style="font-weight: bold; margin-bottom: 8px; color: var(--accent);">🔍 Extracting Specs</div>
              <div id="progress-status-${loadingId}" style="margin-bottom: 8px; color: var(--muted);">Starting pipeline...</div>
              <div style="background: var(--surface2); height: 8px; border-radius: 4px; overflow: hidden; margin-bottom: 8px;">
                <div id="progress-bar-${loadingId}" style="width: 0%; height: 100%; background: var(--accent); transition: width 0.3s ease;"></div>
              </div>
              <div id="progress-features-${loadingId}" style="color: var(--fg); font-size: 11px;"></div>
            </div>
          </div>
        </div>`;

      document.getElementById('chat-container').innerHTML += initialProgressHTML;
      document.getElementById('chat-container').scrollTo({ top: document.getElementById('chat-container').scrollHeight });

      try {
        const res = await fetch("/api/find_alternatives", {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ filename: filename, session_id: currentSessionId, user_id: currentUser })
        });

        const reader = res.body.getReader();
        const decoder = new TextDecoder("utf-8");
        let done = false;
        let buffer = "";
        let foundFeaturesHTML = "";

        while (!done) {
          const { value, done: readerDone } = await reader.read();
          done = readerDone;
          if (value) {
            buffer += decoder.decode(value, { stream: true });
            let events = buffer.split('\n\n');
            buffer = events.pop(); // keep the last incomplete chunk

            for (const event of events) {
              const lines = event.split('\n');
              for (const line of lines) {
                if (line.startsWith('data: ')) {
                  try {
                    const data = JSON.parse(line.substring(6));

                    if (data.error) {
                      appendSystemMessage(`<span style="color:var(--danger)">Error: ${data.error}</span>`);
                      document.getElementById(loadingId)?.remove();
                      return;
                    }

                    if (data.type === "interactive_ranking") {
                      document.getElementById(loadingId)?.remove();
                      promptForWeightsInChat(data.answer, data.extracted_specs, data.detected_type);

                      const userMsg = { "role": "user", "content": `Find alternatives for ${filename}` };
                      const assistantMsg = { "role": "assistant", "content": JSON.stringify(data) };
                      chatHistory.push(userMsg);
                      chatHistory.push(assistantMsg);

                      fetch("/api/sessions/save_messages", {
                        method: "POST", headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ session_id: currentSessionId, new_messages: [userMsg, assistantMsg] })
                      });
                    } else if (data.event) {
                      const statusEl = document.getElementById(`progress-status-${loadingId}`);
                      const barEl = document.getElementById(`progress-bar-${loadingId}`);
                      const featuresEl = document.getElementById(`progress-features-${loadingId}`);

                      if (!statusEl) continue; // If removed early

                      if (data.event === "start") {
                        statusEl.innerText = `Analyzing ${data.component_type}... (0/${data.total_features} features)`;
                        barEl.style.width = '5%';
                      } else if (data.event === "window") {
                        statusEl.innerText = `Scanning pages ${data.start_page}-${data.end_page} of ${data.total_pages}...`;
                        const pct = Math.min(95, 5 + (data.end_page / data.total_pages) * 40);
                        barEl.style.width = pct + '%';
                      } else if (data.event === "text_pass") {
                        if (data.found_names && data.found_names.length > 0) {
                          data.found_names.forEach(f => {
                            foundFeaturesHTML += `<div style="display:inline-block; padding: 2px 6px; background: rgba(0,229,176,0.1); border-radius: 4px; margin: 2px; color: var(--accent);">✅ ${f}</div>`;
                          });
                          featuresEl.innerHTML = foundFeaturesHTML;
                        }
                        statusEl.innerText = `Extracted ${data.resolved}/${data.total_features} features...`;
                        const pct = Math.min(95, 45 + (data.resolved / data.total_features) * 50);
                        barEl.style.width = pct + '%';
                      } else if (data.event === "progress") {
                        statusEl.innerText = `Extracted ${data.resolved}/${data.total_features} features...`;
                        const pct = Math.min(95, 45 + (data.resolved / data.total_features) * 50);
                        barEl.style.width = pct + '%';
                      } else if (data.event === "complete") {
                        statusEl.innerText = `Complete! (${data.resolved}/${data.total_features} features)`;
                        barEl.style.width = '100%';
                      }
                    }
                  } catch (e) {
                    console.error("SSE parse error", e, line);
                  }
                }
              }
            }
          }
        }
      } catch (err) {
        document.getElementById(loadingId)?.remove();
        appendSystemMessage(`<div style="color:var(--danger)">⚠️ <b>Something went wrong</b> — ${err.message || 'Failed to find alternatives.'}</div>`);
      }
    }

    async function detachPdfFromWorkspace(pdfHash, filename) {
      if (!currentSessionId) return;
      if (!confirm(`Remove "${filename}" from this workspace?`)) return;

      // If we don't have the hash, find it from currentAttachedPdfs
      if (!pdfHash) {
        const match = (window.currentAttachedPdfs || []).find(p => p.filename === filename);
        if (match) pdfHash = match.hash;
      }
      if (!pdfHash) {
        alert("Could not find the PDF hash. Please refresh and try again.");
        return;
      }

      try {
        const res = await fetch(`/api/sessions/${currentSessionId}/detach_pdf`, {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ session_id: currentSessionId, pdf_hash: pdfHash })
        });
        const data = await res.json();
        if (data.status === "success") {
          // Reload the session to refresh the PDF pill bar
          const titleEl = document.getElementById('current-session-title');
          loadSessionData(currentSessionId, titleEl.innerText);
        } else {
          alert("Failed to remove PDF.");
        }
      } catch (err) {
        alert("Error removing PDF: " + err.message);
      }
    }

    // --- THE ULTIMATE DRAG SHIELD LOGIC ---

    // 1. Create a massive invisible shield that covers the entire screen
    const dragShield = document.createElement('div');
    dragShield.id = "drag-shield";
    dragShield.style.position = 'fixed';
    dragShield.style.top = '0';
    dragShield.style.left = '0';
    dragShield.style.width = '100vw';
    dragShield.style.height = '100vh';
    dragShield.style.zIndex = '999999'; // Sits above literally everything
    dragShield.style.display = 'none';  // Hidden by default
    dragShield.style.backgroundColor = 'rgba(0, 229, 176, 0.05)'; // Faint teal tint
    dragShield.style.boxSizing = 'border-box';
    dragShield.style.border = '4px dashed var(--accent)';
    document.body.appendChild(dragShield);

    // 2. Prevent default browser behavior globally so it NEVER opens the PDF
    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
      document.addEventListener(eventName, (e) => {
        e.preventDefault();
        e.stopPropagation();
      }, false);
    });

    // 3. When a file enters the window, activate the shield!
    document.addEventListener('dragenter', (e) => {
      if (e.dataTransfer.types.includes('Files')) {
        dragShield.style.display = 'block';
      }
    });

    // 4. If they drag the file back out of the browser window, hide the shield
    dragShield.addEventListener('dragleave', (e) => {
      dragShield.style.display = 'none';
    });

    // 5. When they drop the file ON the shield, upload and hide the shield
    dragShield.addEventListener('drop', (e) => {
      dragShield.style.display = 'none';
      const files = e.dataTransfer.files;

      // Send the dropped files directly to our uploader
      if (files && files.length > 0) {
        uploadAttachedPdf(files);
      }
    });
  </script>
